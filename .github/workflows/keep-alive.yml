name: Keep HF Space Alive Forever

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Ping HF Space every 5 seconds
        run: |
          URL="https://juniorirumva-vg.hf.space/"
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Ping $i/12 → $STATUS @ $(date)"
            sleep 5
          done

      - name: Keep repo active
        run: |
          git config user.email "bot@github.com"
          git config user.name "KeepAlive Bot"
          echo "$(date)" >> .keepalive
          git add .keepalive
          git commit -m "keepalive $(date +%s)" || true
          git push || true

      - name: Self-trigger next run
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/keep-alive.yml/dispatches \
            -d '{"ref":"main"}'
