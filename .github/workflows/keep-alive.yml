# .github/workflows/keep-alive.yml
name: Keep HF Space Alive

on:
  schedule:
    - cron: '* * * * *'  # every 1 minute (GitHub minimum)
  workflow_dispatch:       # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HF Space every 5 seconds for 1 minute
        run: |
          DIRECT_URL="https://juniorirumva-vg.hf.space/"
          HF_URL="https://huggingface.co/spaces/juniorirumva/vg"
          
          for i in {1..12}; do
            # Ping the direct Space URL (this is what keeps it alive)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DIRECT_URL")
            echo "Ping $i/12 - Direct URL Status: $STATUS - $(date)"
            
            if [ "$STATUS" == "200" ]; then
              echo "✅ Space is alive"
            else
              echo "⚠️ Space returned $STATUS - trying HF URL..."
              STATUS2=$(curl -s -o /dev/null -w "%{http_code}" "$HF_URL")
              echo "   HF URL Status: $STATUS2"
            fi
            
            sleep 5
          done
